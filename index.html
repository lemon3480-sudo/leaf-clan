<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Leaf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #080d0a; color: #dde; min-height: 100vh; }

    .bg-wrap { position: fixed; inset: 0; z-index: 0; transition: opacity 0.4s; }
    .bg-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45); }
    .bg-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(57,255,20,0.05) 0%, transparent 70%); }

    .content { position: relative; z-index: 1; }

    nav {
      background: rgba(8,13,10,0.7);
      border-bottom: 1px solid rgba(57,255,20,0.2);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Press Start 2P', monospace; font-size: 16px; color: #39ff14;
      text-shadow: 0 0 8px rgba(57,255,20,0.9), 0 0 20px rgba(57,255,20,0.5), 0 0 40px rgba(57,255,20,0.3);
      letter-spacing: 2px;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: #8aaa90; text-decoration: none; font-size: 16px; font-weight: 600; transition: color 0.2s; cursor: pointer; }
    .nav-links a:hover { color: #39ff14; }
    .nav-links a.active { color: #39ff14; border-bottom: 2px solid #39ff14; padding-bottom: 2px; }

    .page { display: none; }
    .page.active { display: block; }

    .hero { text-align: center; padding: 48px 24px 32px; border-bottom: 1px solid rgba(57,255,20,0.1); }
    .hero h1 {
      font-family: 'Press Start 2P', monospace; font-size: 28px; color: #39ff14;
      text-shadow: 0 0 10px rgba(57,255,20,0.9), 0 0 30px rgba(57,255,20,0.5), 0 0 60px rgba(57,255,20,0.3);
      margin-bottom: 10px; letter-spacing: 3px;
    }
    .hero p { color: #6a8a70; font-size: 14px; }
    .online-badge {
      display: inline-flex; align-items: center; gap: 7px; margin-top: 12px;
      background: rgba(57,255,20,0.07); border: 1px solid rgba(57,255,20,0.25);
      border-radius: 20px; padding: 5px 16px; font-size: 12px; color: #39ff14;
    }
    .dot { width: 6px; height: 6px; background: #39ff14; border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .tier-section { padding: 24px; }
    .search-wrap { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: rgba(10,20,13,0.8); border: 1px solid rgba(57,255,20,0.25);
      border-radius: 8px; padding: 8px 14px; backdrop-filter: blur(8px); width: 240px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box:focus-within { border-color: rgba(57,255,20,0.6); box-shadow: 0 0 12px rgba(57,255,20,0.15); }
    .search-box i { font-size: 16px; color: #3a6040; flex-shrink: 0; }
    .search-box input { background: none; border: none; outline: none; color: #cce; font-size: 13px; width: 100%; font-family: 'Noto Sans KR', sans-serif; }
    .search-box input::placeholder { color: #3a5a40; }

    .tier-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .tier-col { background: rgba(10,20,13,0.82); border-radius: 10px; transition: box-shadow 0.3s, border-color 0.3s; overflow: hidden; }
    .tier-col.col-head   { border: 1px solid rgba(245,197,24,0.35); }
    .tier-col.col-elder  { border: 1px solid rgba(232,216,122,0.3); }
    .tier-col.col-fruit  { border: 1px solid rgba(160,224,64,0.3); }
    .tier-col.col-seed   { border: 1px solid rgba(64,200,160,0.3); }
    .tier-col.col-head:hover   { box-shadow: 0 0 20px rgba(245,197,24,0.3); border-color: rgba(245,197,24,0.7); }
    .tier-col.col-elder:hover  { box-shadow: 0 0 20px rgba(232,216,122,0.25); border-color: rgba(232,216,122,0.6); }
    .tier-col.col-fruit:hover  { box-shadow: 0 0 20px rgba(160,224,64,0.25); border-color: rgba(160,224,64,0.6); }
    .tier-col.col-seed:hover   { box-shadow: 0 0 20px rgba(64,200,160,0.25); border-color: rgba(64,200,160,0.6); }

    .tier-header { padding: 12px 16px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); border-radius: 9px 9px 0 0; }
    .th-head   { background: rgba(42,34,0,0.9); color: #f5c518; }
    .th-elder  { background: rgba(42,39,0,0.9); color: #e8d87a; }
    .th-senior { background: rgba(26,34,10,0.9); color: #4a7a30; }
    .th-fruit  { background: rgba(26,42,10,0.9); color: #a0e040; }
    .th-leaf   { background: rgba(10,34,28,0.9); color: #40c8a0; }
    .th-seed   { background: rgba(10,34,28,0.9); color: #40c8a0; }
    .tier-subheader { padding: 10px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }

    .member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background 0.15s; position: relative;
    }
    .member-row:last-child { border-bottom: none; }
    .col-head  .member-row:hover { background: rgba(245,197,24,0.08); }
    .col-elder .member-row:hover { background: rgba(232,216,122,0.07); }
    .col-fruit .member-row:hover { background: rgba(160,224,64,0.07); }
    .col-seed  .member-row:hover { background: rgba(64,200,160,0.07); }
    .col-head  .member-row:hover .member-name { color: #f5c518; }
    .col-elder .member-row:hover .member-name { color: #e8d87a; }
    .col-fruit .member-row:hover .member-name { color: #a0e040; }
    .col-seed  .member-row:hover .member-name { color: #40c8a0; }
    .skin-wrap { width: 40px; height: 40px; border-radius: 5px; overflow: hidden; background: #1a2a1e; flex-shrink: 0; }
    .skin-wrap img { width: 100%; height: 100%; image-rendering: pixelated; }
    .member-name { font-size: 14px; font-weight: 600; flex: 1; color: #cce; transition: color 0.2s; }
    .online-dot { width: 7px; height: 7px; background: #39ff14; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px rgba(57,255,20,0.7); }
    .loading { text-align: center; padding: 32px; color: #3a5a40; font-size: 13px; }
    .hidden { display: none !important; }

    .hover-popup {
      display: none; position: fixed;
      background: rgba(6,14,8,0.99); border: 1px solid rgba(57,255,20,0.35);
      border-radius: 10px; padding: 14px 16px; width: 220px; z-index: 200;
      box-shadow: 0 0 24px rgba(57,255,20,0.2), 0 4px 20px rgba(0,0,0,0.6); pointer-events: none;
    }
    .hover-popup.active { display: block; }
    .popup-nick { font-size: 14px; font-weight: 700; color: #eef; margin-bottom: 10px; border-bottom: 1px solid rgba(57,255,20,0.15); padding-bottom: 8px; }
    .popup-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7a9a80; margin-bottom: 6px; }
    .popup-row:last-child { margin-bottom: 0; }
    .popup-row i { font-size: 14px; color: #39ff14; flex-shrink: 0; }
    .popup-val { color: #aac; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { position: relative; background: rgba(8,15,10,0.97); border: 1px solid rgba(57,255,20,0.25); border-radius: 16px; width: 520px; overflow: hidden; box-shadow: 0 0 40px rgba(57,255,20,0.1); }
    .modal-head { padding: 28px 24px 24px; border-bottom: 1px solid rgba(57,255,20,0.1); display: flex; align-items: flex-end; gap: 20px; background: rgba(5,12,7,0.8); }
    .modal-skin-wrap { width: 110px; height: 140px; flex-shrink: 0; overflow: hidden; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.8)); }
    .modal-skin-wrap img { width: 100%; height: 100%; image-rendering: pixelated; object-fit: cover; }
    .modal-info { flex: 1; padding-bottom: 4px; }
    .modal-name { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #eef; }
    .modal-rank { font-size: 12px; padding: 4px 12px; border-radius: 6px; display: inline-block; margin-bottom: 8px; font-weight: 600; }
    .r-head   { background: rgba(58,46,0,0.9); color: #f5c518; border: 1px solid rgba(245,197,24,0.3); }
    .r-elder  { background: rgba(42,39,0,0.9); color: #e8d87a; border: 1px solid rgba(232,216,122,0.3); }
    .r-senior { background: rgba(26,34,10,0.9); color: #4a7a30; border: 1px solid rgba(74,122,48,0.3); }
    .r-fruit  { background: rgba(26,42,10,0.9); color: #a0e040; border: 1px solid rgba(160,224,64,0.3); }
    .r-leaf   { background: rgba(10,34,28,0.9); color: #40c8a0; border: 1px solid rgba(64,200,160,0.3); }
    .r-seed   { background: rgba(10,34,28,0.9); color: #40c8a0; border: 1px solid rgba(64,200,160,0.3); }
    .modal-discord { font-size: 12px; color: #5865f2; margin-top: 6px; }
    .modal-body { padding: 24px; }
    .modal-bio { font-size: 14px; color: #7a9a80; line-height: 1.8; margin-bottom: 20px; min-height: 40px; }
    .stats { display: flex; gap: 12px; }
    .stat { flex: 1; background: rgba(5,12,7,0.8); border: 1px solid rgba(57,255,20,0.1); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: #3a5a40; margin-bottom: 6px; }
    .stat-val { font-size: 15px; font-weight: 700; color: #cce; }
    .close-btn { position: absolute; top: 14px; right: 18px; background: none; border: none; color: #3a5a40; font-size: 22px; cursor: pointer; transition: color 0.2s; }
    .close-btn:hover { color: #39ff14; }

    .page-hero { text-align: center; padding: 40px 24px 28px; border-bottom: 1px solid rgba(57,255,20,0.1); }
    .page-hero h2 { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #39ff14; text-shadow: 0 0 10px rgba(57,255,20,0.9), 0 0 30px rgba(57,255,20,0.5); margin-bottom: 12px; letter-spacing: 3px; }
    .page-hero p { font-size: 15px; }
    .page-hero p { color: #6a8a70; font-size: 13px; }

    .video-section { padding: 24px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
    .video-card {
      background: rgba(10,20,13,0.82); border: 1px solid rgba(57,255,20,0.15);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .video-card:hover { border-color: rgba(57,255,20,0.5); box-shadow: 0 0 20px rgba(57,255,20,0.15); transform: translateY(-3px); }
    .video-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #0a1a0d; }
    .video-info { padding: 14px 16px; }
    .video-author { font-size: 13px; font-weight: 700; color: #39ff14; margin-bottom: 4px; }
    .video-url { font-size: 11px; color: #4a8a60; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .video-meta { font-size: 11px; color: #4a6a50; }
    .video-empty { text-align: center; padding: 60px; color: #3a5a40; font-size: 14px; }
    .board-wrap { display: flex; gap: 20px; padding: 24px 32px; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
    .board-main { flex: 1; min-width: 0; }
    .board-sidebar { width: 240px; flex-shrink: 0; }

    .board-filter { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .board-filter-label { font-size: 13px; color: rgba(255,255,255,0.4); margin-right: 4px; }
    .filter-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 6px 18px; color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
      backdrop-filter: blur(8px);
    }
    .filter-btn.active {
      background: rgba(57,255,20,0.15); border-color: #39ff14; color: #39ff14;
      box-shadow: 0 0 12px rgba(57,255,20,0.3);
    }
    .filter-btn:hover { color: #39ff14; border-color: rgba(57,255,20,0.5); }

    .board-input-wrap {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 18px; margin-bottom: 20px;
      display: flex; gap: 14px; align-items: flex-start;
      backdrop-filter: blur(12px);
    }
    .board-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(57,255,20,0.1); border: 1px solid rgba(57,255,20,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 20px; color: rgba(255,255,255,0.5);
    }
    .board-input-right { flex: 1; }
    .board-nickname {
      width: 160px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 12px; color: #eee; font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .board-nickname:focus { border-color: rgba(57,255,20,0.5); }
    .board-nickname::placeholder { color: rgba(255,255,255,0.25); }
    .board-textarea {
      width: 100%; background: rgba(57,255,20,0.05);
      border: 1px solid #39ff14;
      border-radius: 10px; padding: 12px 14px; color: #eee; font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif; resize: none; outline: none;
      transition: box-shadow 0.2s; height: 90px;
      box-shadow: 0 0 12px rgba(57,255,20,0.2), inset 0 0 20px rgba(57,255,20,0.05);
    }
    .board-textarea:focus { box-shadow: 0 0 20px rgba(57,255,20,0.4), inset 0 0 20px rgba(57,255,20,0.08); }
    .board-textarea::placeholder { color: rgba(255,255,255,0.25); }
    .board-input-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
    .board-submit {
      background: #39ff14; border: none;
      border-radius: 8px; padding: 10px 22px; color: #050f05; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; gap: 6px;
      box-shadow: 0 0 16px rgba(57,255,20,0.4);
    }
    .board-submit:hover { background: #5fff35; box-shadow: 0 0 24px rgba(57,255,20,0.6); }

    .board-post {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 18px 20px; margin-bottom: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(12px);
    }
    .board-post:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .board-post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .post-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
      color: rgba(255,255,255,0.4);
    }
    .post-nick { font-size: 14px; font-weight: 700; color: #eee; }
    .post-date { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: auto; }
    .board-post-text { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.75; margin-bottom: 14px; padding-left: 48px; }
    .board-post-actions { display: flex; gap: 20px; padding-left: 48px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
    .action-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: rgba(255,255,255,0.35); font-size: 13px; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; transition: color 0.2s; padding: 0;
    }
    .action-btn:hover { color: rgba(255,255,255,0.7); }
    .action-btn.liked { color: #39ff14; }
    .action-btn i { font-size: 15px; }

    .comment-wrap { margin-top: 14px; padding-left: 48px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; display: none; }
    .comment-wrap.open { display: block; }
    .comment-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .comment-nick {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 7px 10px; color: #eee; font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif; outline: none; width: 90px; flex-shrink: 0;
    }
    .comment-nick::placeholder { color: rgba(255,255,255,0.25); }
    .comment-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 7px 10px; color: #eee; font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif; outline: none;
    }
    .comment-input::placeholder { color: rgba(255,255,255,0.25); }
    .comment-submit {
      background: rgba(57,255,20,0.15); border: 1px solid rgba(57,255,20,0.4);
      border-radius: 8px; padding: 7px 14px; color: #39ff14; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif; flex-shrink: 0;
      transition: background 0.2s;
    }
    .comment-submit:hover { background: rgba(57,255,20,0.25); }
    .comment-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .comment-avatar { width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; color: rgba(255,255,255,0.4); }
    .comment-body { flex: 1; }
    .comment-nick-text { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8); margin-right: 8px; }
    .comment-text { font-size: 12px; color: rgba(255,255,255,0.55); }
    .comment-date { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 2px; }

    .board-sidebar-card {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 20px; backdrop-filter: blur(12px);
    }
    .sidebar-clan-logo {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(57,255,20,0.15); border: 2px solid rgba(57,255,20,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin: 0 auto 12px;
    }
    .sidebar-clan-name { text-align: center; font-size: 15px; font-weight: 700; color: #eee; margin-bottom: 4px; }
    .sidebar-clan-sub { text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
    .sidebar-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin-bottom: 14px; }
    .sidebar-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; }
    .sidebar-label { color: rgba(255,255,255,0.4); }
    .sidebar-val { color: #eee; font-weight: 600; }
  </style>
</head>
<body>

<div class="bg-wrap" id="bgWrap">
  <img class="bg-img" id="bgImg" src="https://lemon3480-sudo.github.io/leaf-clan/images/bg.png" alt="">
  <div class="bg-overlay"></div>
</div>

<div class="hover-popup" id="hoverPopup">
  <div class="popup-nick" id="popup-nick"></div>
  <div class="popup-row"><i class="ti ti-id-badge" aria-hidden="true"></i><span style="color:#7a9a80;font-size:12px;">콜사인&nbsp;</span><span class="popup-val" id="popup-callsign"></span></div>
  <div class="popup-row"><i class="ti ti-at" aria-hidden="true"></i><span class="popup-val" id="popup-discord"></span></div>
  <div class="popup-row"><i class="ti ti-calendar" aria-hidden="true"></i><span class="popup-val" id="popup-join"></span></div>
</div>

<div class="content">
  <nav>
    <div class="logo">LEAF</div>
    <div class="nav-links">
      <a class="active" onclick="showPage('members', this)">클랜원</a>
      <a onclick="showPage('video', this)">영상</a>
      <a onclick="showPage('board', this)">게시판</a>
    </div>
  </nav>

  <div id="page-members" class="page active">
    <div class="hero">
      <h1>TEAM LEAF</h1>
      <p>마인크래프트 PvP 클랜</p>
      <div class="online-badge"><span class="dot"></span>실시간 연동중</div>
    </div>
    <div class="tier-section">
      <div class="search-wrap">
        <div class="search-box">
          <i class="ti ti-search" aria-hidden="true"></i>
          <input type="text" id="searchInput" placeholder="닉네임 검색...">
        </div>
      </div>
      <div class="tier-grid">
        <div class="tier-col col-head">
          <div class="tier-header th-head">👑 Head</div>
          <div id="tier-head"><div class="loading">불러오는 중...</div></div>
        </div>
        <div class="tier-col col-elder">
          <div class="tier-header th-elder">🍃 Elder</div>
          <div id="tier-elder"></div>
          <div class="tier-subheader th-senior">🍃 Senior</div>
          <div id="tier-senior"></div>
        </div>
        <div class="tier-col col-fruit">
          <div class="tier-header th-fruit">🍃 Fruit</div>
          <div id="tier-fruit"></div>
          <div class="tier-subheader th-leaf">🍃 Leaf</div>
          <div id="tier-leaf"></div>
        </div>
        <div class="tier-col col-seed">
          <div class="tier-header th-seed">💧 Seed</div>
          <div id="tier-seed"><div class="loading">불러오는 중...</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-video" class="page">
    <div class="page-hero">
      <h2>영상</h2>
      <p>Leaf 팀원들의 pvp 영상 모음</p>
    </div>
    <div class="video-section">
      <div class="video-grid" id="videoGrid">
        <div class="video-empty">불러오는 중...</div>
      </div>
    </div>
  </div>

  <div id="page-board" class="page">
    <div class="page-hero">
      <h2>게시판</h2>
      <p>자유롭게 소통해요</p>
    </div>
    <div class="board-wrap">
      <div class="board-main">
        <div class="board-filter">
          <span class="board-filter-label">필터</span>
          <button class="filter-btn active" id="filter-recent" onclick="setFilter('recent')">최신순</button>
          <button class="filter-btn" id="filter-popular" onclick="setFilter('popular')">인기순</button>
        </div>
        <div class="board-input-wrap">
          <div class="board-avatar">?</div>
          <div class="board-input-right">
            <input class="board-nickname" id="boardNick" placeholder="닉네임 입력..." maxlength="20">
            <textarea class="board-textarea" id="boardInput" placeholder="글을 작성하세요..."></textarea>
            <div class="board-input-footer">
              <button class="board-submit" onclick="submitPost()">
                <i class="ti ti-send" aria-hidden="true"></i> 게시하기
              </button>
            </div>
          </div>
        </div>
        <div id="boardPosts"></div>
      </div>
      <div class="board-sidebar">
        <div class="board-sidebar-card">
          <div class="sidebar-clan-logo">🍃</div>
          <div class="sidebar-clan-name">Team LEAF</div>
          <div class="sidebar-clan-sub">클랜 · LEAF</div>
          <hr class="sidebar-divider">
          <div class="sidebar-title">게시판 정보</div>
          <div class="sidebar-row"><span class="sidebar-label">총 게시글</span><span class="sidebar-val" id="sidebar-total">0</span></div>
          <div class="sidebar-row"><span class="sidebar-label">오늘 게시글</span><span class="sidebar-val" id="sidebar-today">0</span></div>
          <div class="sidebar-row"><span class="sidebar-label">총 좋아요</span><span class="sidebar-val" id="sidebar-likes">0</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">x</button>
    <div class="modal-head">
      <div class="modal-skin-wrap"><img id="modal-skin" src="" alt=""></div>
      <div class="modal-info">
        <div class="modal-name" id="modal-name"></div>
        <span class="modal-rank" id="modal-rank"></span>
        <div class="modal-discord" id="modal-discord"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-bio" id="modal-bio"></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">지역</div><div class="stat-val" id="modal-region">-</div></div>
        <div class="stat"><div class="stat-label">주 종목</div><div class="stat-val" id="modal-mode">-</div></div>
        <div class="stat"><div class="stat-label">역할</div><div class="stat-val" id="modal-role">-</div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmoMAQQ21iq424Y9205wiBb2LIijpN2lY",
    authDomain: "leaf-clan.firebaseapp.com",
    projectId: "leaf-clan",
    storageBucket: "leaf-clan.firebasestorage.app",
    messagingSenderId: "63275953645",
    appId: "1:63275953645:web:810221cce6d66d9e9e8be4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const bgImages = {
    members: 'https://lemon3480-sudo.github.io/leaf-clan/images/bg.png',
    video:   'https://lemon3480-sudo.github.io/leaf-clan/images/vedio.png',
    board:   'https://lemon3480-sudo.github.io/leaf-clan/images/chat.png',
  };

  window.showPage = function(page, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if (el) el.classList.add('active');
    document.getElementById('bgImg').src = bgImages[page] || bgImages.members;
  }

  const roleConfig = {
    Head:   { color: 'r-head',   label: '👑 Head' },
    Elder:  { color: 'r-elder',  label: '🍃 Elder' },
    Senior: { color: 'r-senior', label: '🍃 Senior' },
    Fruit:  { color: 'r-fruit',  label: '🍃 Fruit' },
    Leaf:   { color: 'r-leaf',   label: '🍃 Leaf' },
    Seed:   { color: 'r-seed',   label: '💧 Seed' },
  };

  const modeIcon = {
    SWORD: 'https://lemon3480-sudo.github.io/leaf-clan/images/sword.png',
    DPOT:  'https://lemon3480-sudo.github.io/leaf-clan/images/dpot.png',
    NPOT:  'https://lemon3480-sudo.github.io/leaf-clan/images/npot.png',
    UHC:   'https://lemon3480-sudo.github.io/leaf-clan/images/uhc.png',
    CPVP:  'https://lemon3480-sudo.github.io/leaf-clan/images/cpvp.png',
    SMP:   'https://lemon3480-sudo.github.io/leaf-clan/images/smp.png',
    AXE:   'https://lemon3480-sudo.github.io/leaf-clan/images/axe.png',
    MACE:  'https://lemon3480-sudo.github.io/leaf-clan/images/mace.png',
  };

  function skinUrl(nick, size) {
    return 'https://visage.surgeplay.com/bust/' + size + '/' + nick;
  }

  function formatDate(ts) {
    if (!ts) return '정보 없음';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  }

  function getYoutubeId(url) {
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function renderCol(colId, members) {
    const col = document.getElementById(colId);
    if (!col) return;
    if (members.length === 0) { col.innerHTML = '<div class="loading">없음</div>'; return; }
    col.innerHTML = members.map(m => {
      const data = JSON.stringify(m).replace(/"/g, '&quot;');
      const callsign = m.callsign || '-';
      return '<div class="member-row" data-nick="' + m.mcNick + '" data-discord="' + (m.discord||'') + '" data-callsign="' + callsign + '" data-join="' + formatDate(m.joinedAt) + '" onclick="showModal(' + data + ')">'
        + '<div class="skin-wrap"><img src="' + skinUrl(m.mcNick, 40) + '" alt="' + m.mcNick + '" onerror="this.style.opacity=0"></div>'
        + '<span class="member-name">' + m.mcNick + '</span>'
        + '<span class="online-dot"></span>'
        + '</div>';
    }).join('');
  }

  function applySearch(query) {
    const q = query.toLowerCase();
    document.querySelectorAll('.member-row').forEach(row => {
      const nick = row.dataset.nick.toLowerCase();
      row.classList.toggle('hidden', q.length > 0 && !nick.includes(q));
    });
  }

  document.getElementById('searchInput').addEventListener('input', e => applySearch(e.target.value));

  const popup = document.getElementById('hoverPopup');
  document.addEventListener('mouseover', e => {
    const row = e.target.closest('.member-row');
    if (row) {
      document.getElementById('popup-nick').textContent = row.dataset.nick;
      document.getElementById('popup-callsign').textContent = row.dataset.callsign || '-';
      document.getElementById('popup-discord').textContent = row.dataset.discord || '-';
      document.getElementById('popup-join').textContent = '가입일 ' + row.dataset.join;
      popup.classList.add('active');
    } else {
      popup.classList.remove('active');
    }
  });
  document.addEventListener('mousemove', e => {
    if (popup.classList.contains('active')) {
      const x = e.clientX + 16; const y = e.clientY - 10;
      const pw = popup.offsetWidth; const ph = popup.offsetHeight;
      popup.style.left = (x + pw > window.innerWidth ? e.clientX - pw - 16 : x) + 'px';
      popup.style.top = (y + ph > window.innerHeight ? e.clientY - ph : y) + 'px';
    }
  });

  onSnapshot(collection(db, "members"), (snapshot) => {
    const members = [];
    snapshot.forEach(doc => members.push({ id: doc.id, ...doc.data() }));
    renderCol('tier-head',   members.filter(m => m.role === 'Head'));
    renderCol('tier-elder',  members.filter(m => m.role === 'Elder'));
    renderCol('tier-senior', members.filter(m => m.role === 'Senior'));
    renderCol('tier-fruit',  members.filter(m => m.role === 'Fruit'));
    renderCol('tier-leaf',   members.filter(m => m.role === 'Leaf'));
    renderCol('tier-seed',   members.filter(m => m.role === 'Seed'));
    applySearch(document.getElementById('searchInput').value);
  });

  onSnapshot(query(collection(db, "videos"), orderBy("postedAt", "desc")), (snapshot) => {
    const grid = document.getElementById('videoGrid');
    if (snapshot.empty) { grid.innerHTML = '<div class="video-empty">아직 등록된 영상이 없어요</div>'; return; }
    grid.innerHTML = '';
    snapshot.forEach(doc => {
      const v = doc.data();
      const vid = getYoutubeId(v.url);
      if (!vid) return;
      const thumb = 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg';
      const ytUrl = 'https://www.youtube.com/watch?v=' + vid;
      const card = document.createElement('div');
      card.className = 'video-card';
      card.onclick = () => window.open(ytUrl, '_blank');
      const authorText = (v.callsign && v.callsign !== '-' ? v.callsign : '') + (v.mcNick ? ' ㅣ ' + v.mcNick : '');
      card.innerHTML = '<img class="video-thumb" src="' + thumb + '" alt="">'
        + '<div class="video-info">'
        + '<div class="video-author">' + (authorText.trim() || v.author || '익명') + '</div>'
        + '<div class="video-url">' + v.url + '</div>'
        + '<div class="video-meta">' + formatDate(v.postedAt) + '</div>'
        + '</div>';
      grid.appendChild(card);
    });
  });

  import { doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let allPosts = [];
  let currentFilter = 'recent';

  window.setFilter = function(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-' + filter).classList.add('active');
    renderPosts();
  }

  function renderPosts() {
    const container = document.getElementById('boardPosts');
    if (allPosts.length === 0) { container.innerHTML = '<div class="loading">아직 게시글이 없어요</div>'; return; }
    let sorted = [...allPosts];
    if (currentFilter === 'popular') sorted.sort((a, b) => (b.likes || 0) - (a.likes || 0));
    container.innerHTML = '';
    sorted.forEach(p => {
      const div = document.createElement('div');
      div.className = 'board-post';
      div.innerHTML =
        '<div class="board-post-header">'
        + '<div class="post-avatar">?</div>'
        + '<span class="post-nick">' + (p.nick || '익명').replace(/</g,'&lt;') + '</span>'
        + '<span class="post-date">' + formatDate(p.createdAt) + '</span>'
        + '</div>'
        + '<div class="board-post-text">' + p.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'
        + '<div class="board-post-actions">'
        + '<button class="action-btn' + (p.liked ? ' liked' : '') + '" onclick="toggleLike(\'' + p.id + '\', this)">'
        + '<i class="ti ti-heart" aria-hidden="true"></i> ' + (p.likes || 0) + '</button>'
        + '<button class="action-btn" onclick="toggleComment(\'' + p.id + '\')">'
        + '<i class="ti ti-message" aria-hidden="true"></i> 댓글</button>'
        + '<button class="action-btn" onclick="sharePost(\'' + p.id + '\')">'
        + '<i class="ti ti-share" aria-hidden="true"></i> 공유</button>'
        + '</div>'
        + '<div class="comment-wrap" id="comments-' + p.id + '">'
        + '<div class="comment-input-row">'
        + '<input class="comment-nick" id="cnick-' + p.id + '" placeholder="닉네임...">'
        + '<input class="comment-input" id="cinput-' + p.id + '" placeholder="댓글 입력...">'
        + '<button class="comment-submit" onclick="submitComment(\'' + p.id + '\')">등록</button>'
        + '</div>'
        + '<div id="clist-' + p.id + '"></div>'
        + '</div>';
      container.appendChild(div);
      loadComments(p.id);
    });
  }

  async function loadComments(postId) {
    const clist = document.getElementById('clist-' + postId);
    if (!clist) return;
    onSnapshot(query(collection(db, 'posts', postId, 'comments'), orderBy('createdAt', 'asc')), snap => {
      clist.innerHTML = '';
      snap.forEach(d => {
        const c = d.data();
        clist.innerHTML += '<div class="comment-item">'
          + '<div class="comment-avatar">?</div>'
          + '<div class="comment-body">'
          + '<span class="comment-nick-text">' + (c.nick||'익명').replace(/</g,'&lt;') + '</span>'
          + '<span class="comment-text">' + c.text.replace(/</g,'&lt;') + '</span>'
          + '<div class="comment-date">' + formatDate(c.createdAt) + '</div>'
          + '</div></div>';
      });
    });
  }

  window.toggleComment = function(postId) {
    const wrap = document.getElementById('comments-' + postId);
    wrap.classList.toggle('open');
  }

  window.toggleLike = async function(postId, btn) {
    const liked = btn.classList.contains('liked');
    const ref = doc(db, 'posts', postId);
    await updateDoc(ref, { likes: increment(liked ? -1 : 1) });
    btn.classList.toggle('liked');
  }

  window.sharePost = function(postId) {
    const url = window.location.href.split('#')[0] + '#post-' + postId;
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사됐어요!'));
  }

  window.submitComment = async function(postId) {
    const nick = document.getElementById('cnick-' + postId).value.trim() || '익명';
    const text = document.getElementById('cinput-' + postId).value.trim();
    if (!text) return;
    await addDoc(collection(db, 'posts', postId, 'comments'), {
      nick, text, createdAt: serverTimestamp()
    });
    document.getElementById('cinput-' + postId).value = '';
  }

  const likedPosts = new Set(JSON.parse(localStorage.getItem('likedPosts') || '[]'));

  onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
    allPosts = [];
    let todayCount = 0; let totalLikes = 0;
    const today = new Date().toDateString();
    snapshot.forEach(d => {
      const p = { id: d.id, ...d.data(), liked: likedPosts.has(d.id) };
      allPosts.push(p);
      if (p.createdAt && p.createdAt.toDate && p.createdAt.toDate().toDateString() === today) todayCount++;
      totalLikes += p.likes || 0;
    });
    document.getElementById('sidebar-total').textContent = allPosts.length;
    document.getElementById('sidebar-today').textContent = todayCount;
    document.getElementById('sidebar-likes').textContent = totalLikes;
    renderPosts();
  });

  window.submitPost = async function() {
    const nick = document.getElementById('boardNick').value.trim() || '익명';
    const text = document.getElementById('boardInput').value.trim();
    if (!text) return;
    const ref = await addDoc(collection(db, "posts"), {
      nick, text, likes: 0, createdAt: serverTimestamp()
    });
    document.getElementById('boardInput').value = '';
  }

  window.showModal = function(m) {
    const cfg = roleConfig[m.role] || { color: 'r-seed', label: m.role };
    document.getElementById('modal-skin').src = skinUrl(m.mcNick, 140);
    document.getElementById('modal-name').textContent = m.mcNick;
    document.getElementById('modal-rank').textContent = cfg.label;
    document.getElementById('modal-rank').className = 'modal-rank ' + cfg.color;
    document.getElementById('modal-discord').textContent = '🎮 ' + (m.discord || '');
    document.getElementById('modal-bio').textContent = m.bio || '자기소개가 없습니다.';
    document.getElementById('modal-region').textContent = m.region || '-';
    const modeEl = document.getElementById('modal-mode');
    if (m.mainMode && modeIcon[m.mainMode]) {
      modeEl.innerHTML = '<img src="' + modeIcon[m.mainMode] + '" style="width:22px;height:22px;image-rendering:pixelated;vertical-align:middle;margin-right:5px;">' + m.mainMode;
    } else { modeEl.textContent = m.mainMode || '-'; }
    const roleEl = document.getElementById('modal-role');
    roleEl.innerHTML = '<span class="modal-rank ' + cfg.color + '" style="font-size:11px;padding:2px 8px;">' + cfg.label + '</span>';
    document.getElementById('modal').classList.add('active');
  }

  window.closeModal = function(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('active');
    }
  }
</script>

</body>
</html>
