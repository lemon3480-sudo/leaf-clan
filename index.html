<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaf Clan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #080d0a; color: #dde; min-height: 100vh; }

    .bg-wrap { position: fixed; inset: 0; z-index: 0; }
    .bg-img { width: 100%; height: 100%; object-fit: cover; filter: blur(4px) brightness(0.45); transform: scale(1.05); }
    .bg-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(57,255,20,0.05) 0%, transparent 70%); }

    .content { position: relative; z-index: 1; }

    nav {
      background: rgba(8,13,10,0.7);
      border-bottom: 1px solid rgba(57,255,20,0.2);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Press Start 2P', monospace; font-size: 16px; color: #39ff14;
      text-shadow: 0 0 8px rgba(57,255,20,0.9), 0 0 20px rgba(57,255,20,0.5), 0 0 40px rgba(57,255,20,0.3);
      letter-spacing: 2px;
    }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: #5a8060; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover { color: #39ff14; }

    .hero { text-align: center; padding: 48px 24px 32px; border-bottom: 1px solid rgba(57,255,20,0.1); }
    .hero h1 {
      font-family: 'Press Start 2P', monospace; font-size: 28px; color: #39ff14;
      text-shadow: 0 0 10px rgba(57,255,20,0.9), 0 0 30px rgba(57,255,20,0.5), 0 0 60px rgba(57,255,20,0.3);
      margin-bottom: 10px; letter-spacing: 3px;
    }
    .hero p { color: #6a8a70; font-size: 14px; }
    .online-badge {
      display: inline-flex; align-items: center; gap: 7px; margin-top: 12px;
      background: rgba(57,255,20,0.07); border: 1px solid rgba(57,255,20,0.25);
      border-radius: 20px; padding: 5px 16px; font-size: 12px; color: #39ff14;
    }
    .dot { width: 6px; height: 6px; background: #39ff14; border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .tier-section { padding: 24px; }

    .search-wrap {
      display: flex; justify-content: flex-end;
      margin-bottom: 14px;
    }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: rgba(10,20,13,0.8);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 8px; padding: 8px 14px;
      backdrop-filter: blur(8px);
      width: 240px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box:focus-within {
      border-color: rgba(57,255,20,0.6);
      box-shadow: 0 0 12px rgba(57,255,20,0.15);
    }
    .search-box i { font-size: 16px; color: #3a6040; flex-shrink: 0; }
    .search-box input {
      background: none; border: none; outline: none;
      color: #cce; font-size: 13px; width: 100%;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .search-box input::placeholder { color: #3a5a40; }

    .tier-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }

    .tier-col {
      background: rgba(10,20,13,0.65);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      transition: box-shadow 0.3s, border-color 0.3s;
      overflow: hidden;
    }
    .tier-col.col-head   { border: 1px solid rgba(245,197,24,0.35); }
    .tier-col.col-elder  { border: 1px solid rgba(232,216,122,0.3); }
    .tier-col.col-fruit  { border: 1px solid rgba(160,224,64,0.3); }
    .tier-col.col-seed   { border: 1px solid rgba(64,200,160,0.3); }
    .tier-col.col-head:hover   { box-shadow: 0 0 20px rgba(245,197,24,0.3); border-color: rgba(245,197,24,0.7); }
    .tier-col.col-elder:hover  { box-shadow: 0 0 20px rgba(232,216,122,0.25); border-color: rgba(232,216,122,0.6); }
    .tier-col.col-fruit:hover  { box-shadow: 0 0 20px rgba(160,224,64,0.25); border-color: rgba(160,224,64,0.6); }
    .tier-col.col-seed:hover   { box-shadow: 0 0 20px rgba(64,200,160,0.25); border-color: rgba(64,200,160,0.6); }

    .tier-header {
      padding: 12px 16px; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      border-radius: 9px 9px 0 0;
      flex-shrink: 0;
    }
    .th-head   { background: rgba(42,34,0,0.9); color: #f5c518; }
    .th-elder  { background: rgba(42,39,0,0.9); color: #e8d87a; }
    .th-senior { background: rgba(26,34,10,0.9); color: #4a7a30; }
    .th-fruit  { background: rgba(26,42,10,0.9); color: #a0e040; }
    .th-leaf   { background: rgba(10,34,28,0.9); color: #40c8a0; }
    .th-seed   { background: rgba(10,34,28,0.9); color: #40c8a0; }

    .tier-subheader {
      padding: 10px 16px; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    .tier-body { flex: 0; }

    .member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .member-row:last-child { border-bottom: none; }

    .col-head  .member-row:hover { background: rgba(245,197,24,0.08); }
    .col-elder .member-row:hover { background: rgba(232,216,122,0.07); }
    .col-fruit .member-row:hover { background: rgba(160,224,64,0.07); }
    .col-seed  .member-row:hover { background: rgba(64,200,160,0.07); }
    .col-head  .member-row:hover .member-name { color: #f5c518; }
    .col-elder .member-row:hover .member-name { color: #e8d87a; }
    .col-fruit .member-row:hover .member-name { color: #a0e040; }
    .col-seed  .member-row:hover .member-name { color: #40c8a0; }

    .skin-wrap { width: 40px; height: 40px; border-radius: 5px; overflow: hidden; background: #1a2a1e; flex-shrink: 0; }
    .skin-wrap img { width: 100%; height: 100%; image-rendering: pixelated; }
    .member-name { font-size: 14px; font-weight: 600; flex: 1; color: #cce; transition: color 0.2s; }
    .online-dot { width: 7px; height: 7px; background: #39ff14; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px rgba(57,255,20,0.7); }

    .hover-popup {
      display: none;
      position: fixed;
      background: rgba(6,14,8,0.97);
      border: 1px solid rgba(57,255,20,0.35);
      border-radius: 10px;
      padding: 14px 16px;
      width: 220px;
      z-index: 200;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 24px rgba(57,255,20,0.2), 0 4px 20px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    .hover-popup.active { display: block; }
    .popup-nick { font-size: 14px; font-weight: 700; color: #eef; margin-bottom: 10px; border-bottom: 1px solid rgba(57,255,20,0.15); padding-bottom: 8px; }
    .popup-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7a9a80; margin-bottom: 6px; }
    .popup-row:last-child { margin-bottom: 0; }
    .popup-row i { font-size: 14px; color: #39ff14; flex-shrink: 0; }
    .popup-val { color: #aac; }

    .loading { text-align: center; padding: 32px; color: #3a5a40; font-size: 13px; }
    .hidden { display: none !important; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { position: relative; background: rgba(8,15,10,0.97); border: 1px solid rgba(57,255,20,0.25); border-radius: 16px; width: 520px; overflow: hidden; backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(57,255,20,0.1); }
    .modal-head { padding: 28px 24px 24px; border-bottom: 1px solid rgba(57,255,20,0.1); display: flex; align-items: flex-end; gap: 20px; background: rgba(5,12,7,0.8); }
    .modal-skin-wrap { width: 110px; height: 140px; flex-shrink: 0; overflow: hidden; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.8)); }
    .modal-skin-wrap img { width: 100%; height: 100%; image-rendering: pixelated; object-fit: cover; }
    .modal-info { flex: 1; padding-bottom: 4px; }
    .modal-name { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #eef; }
    .modal-rank { font-size: 12px; padding: 4px 12px; border-radius: 6px; display: inline-block; margin-bottom: 8px; font-weight: 600; }
    .r-head   { background: rgba(58,46,0,0.9); color: #f5c518; border: 1px solid rgba(245,197,24,0.3); }
    .r-elder  { background: rgba(42,39,0,0.9); color: #e8d87a; border: 1px solid rgba(232,216,122,0.3); }
    .r-senior { background: rgba(26,34,10,0.9); color: #4a7a30; border: 1px solid rgba(74,122,48,0.3); }
    .r-fruit  { background: rgba(26,42,10,0.9); color: #a0e040; border: 1px solid rgba(160,224,64,0.3); }
    .r-leaf   { background: rgba(10,34,28,0.9); color: #40c8a0; border: 1px solid rgba(64,200,160,0.3); }
    .r-seed   { background: rgba(10,34,28,0.9); color: #40c8a0; border: 1px solid rgba(64,200,160,0.3); }
    .modal-discord { font-size: 12px; color: #5865f2; margin-top: 6px; }
    .modal-body { padding: 24px; }
    .modal-bio { font-size: 14px; color: #7a9a80; line-height: 1.8; margin-bottom: 20px; min-height: 40px; }
    .stats { display: flex; gap: 12px; }
    .stat { flex: 1; background: rgba(5,12,7,0.8); border: 1px solid rgba(57,255,20,0.1); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: #3a5a40; margin-bottom: 6px; }
    .stat-val { font-size: 15px; font-weight: 700; color: #cce; }
    .close-btn { position: absolute; top: 14px; right: 18px; background: none; border: none; color: #3a5a40; font-size: 22px; cursor: pointer; transition: color 0.2s; }
    .close-btn:hover { color: #39ff14; }
  </style>
</head>
<body>

<div class="bg-wrap">
  <img class="bg-img" src="https://lemon3480-sudo.github.io/leaf-clan/images/bg.png" alt="">
  <div class="bg-overlay"></div>
</div>

<div class="hover-popup" id="hoverPopup">
  <div class="popup-nick" id="popup-nick"></div>
  <div class="popup-row"><i class="ti ti-id-badge" aria-hidden="true"></i><span style="color:#7a9a80;font-size:12px;">콜사인&nbsp;</span><span class="popup-val" id="popup-callsign"></span></div>
  <div class="popup-row"><i class="ti ti-at" aria-hidden="true"></i><span class="popup-val" id="popup-discord"></span></div>
  <div class="popup-row"><i class="ti ti-calendar" aria-hidden="true"></i><span class="popup-val" id="popup-join"></span></div>
</div>

<div class="content">
  <nav>
    <div class="logo">LEAF</div>
    <div class="nav-links">
      <a href="#">홈</a>
      <a href="#">클랜원</a>
      <a href="#">공지</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Team Leaf</h1>
    <p>마인크래프트 PvP 클랜</p>
    <div class="online-badge"><span class="dot"></span>실시간 연동중</div>
  </div>

  <div class="tier-section">
    <div class="search-wrap">
      <div class="search-box">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="닉네임 검색...">
      </div>
    </div>

    <div class="tier-grid">
      <div class="tier-col col-head">
        <div class="tier-header th-head">👑 Head</div>
        <div class="tier-body" id="tier-head"><div class="loading">불러오는 중...</div></div>
      </div>
      <div class="tier-col col-elder">
        <div class="tier-header th-elder">🍃 Elder</div>
        <div class="tier-body" id="tier-elder"></div>
        <div class="tier-subheader th-senior">🍃 Senior</div>
        <div class="tier-body" id="tier-senior"></div>
      </div>
      <div class="tier-col col-fruit">
        <div class="tier-header th-fruit">🍃 Fruit</div>
        <div class="tier-body" id="tier-fruit"></div>
        <div class="tier-subheader th-leaf">🍃 Leaf</div>
        <div class="tier-body" id="tier-leaf"></div>
      </div>
      <div class="tier-col col-seed">
        <div class="tier-header th-seed">💧 Seed</div>
        <div class="tier-body" id="tier-seed"><div class="loading">불러오는 중...</div></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">x</button>
    <div class="modal-head">
      <div class="modal-skin-wrap"><img id="modal-skin" src="" alt=""></div>
      <div class="modal-info">
        <div class="modal-name" id="modal-name"></div>
        <span class="modal-rank" id="modal-rank"></span>
        <div class="modal-discord" id="modal-discord"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-bio" id="modal-bio"></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">지역</div><div class="stat-val" id="modal-region">-</div></div>
        <div class="stat"><div class="stat-label">주 종목</div><div class="stat-val" id="modal-mode">-</div></div>
        <div class="stat"><div class="stat-label">역할</div><div class="stat-val" id="modal-role">-</div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmoMAQQ21iq424Y9205wiBb2LIijpN2lY",
    authDomain: "leaf-clan.firebaseapp.com",
    projectId: "leaf-clan",
    storageBucket: "leaf-clan.firebasestorage.app",
    messagingSenderId: "63275953645",
    appId: "1:63275953645:web:810221cce6d66d9e9e8be4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const roleConfig = {
    Head:   { color: 'r-head',   label: '👑 Head' },
    Elder:  { color: 'r-elder',  label: '🍃 Elder' },
    Senior: { color: 'r-senior', label: '🍃 Senior' },
    Fruit:  { color: 'r-fruit',  label: '🍃 Fruit' },
    Leaf:   { color: 'r-leaf',   label: '🍃 Leaf' },
    Seed:   { color: 'r-seed',   label: '💧 Seed' },
  };

  const modeIcon = {
    SWORD: 'https://lemon3480-sudo.github.io/leaf-clan/images/sword.png',
    DPOT:  'https://lemon3480-sudo.github.io/leaf-clan/images/dpot.png',
    NPOT:  'https://lemon3480-sudo.github.io/leaf-clan/images/npot.png',
    UHC:   'https://lemon3480-sudo.github.io/leaf-clan/images/uhc.png',
    CPVP:  'https://lemon3480-sudo.github.io/leaf-clan/images/cpvp.png',
    SMP:   'https://lemon3480-sudo.github.io/leaf-clan/images/smp.png',
    AXE:   'https://lemon3480-sudo.github.io/leaf-clan/images/axe.png',
    MACE:  'https://lemon3480-sudo.github.io/leaf-clan/images/mace.png',
  };

  function skinUrl(nick, size) {
    return 'https://visage.surgeplay.com/bust/' + size + '/' + nick;
  }

  function formatDate(ts) {
    if (!ts) return '정보 없음';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  }

  function getCallsign(discord) {
    if (!discord) return '-';
    const sep = discord.includes('|') ? '|' : (discord.includes('ㅣ') ? 'ㅣ' : null);
    if (!sep) return '-';
    return discord.split(sep)[0].trim();
  }

  let allMembers = [];
  const popup = document.getElementById('hoverPopup');

  function renderCol(colId, members) {
    const col = document.getElementById(colId);
    if (!col) return;
    if (members.length === 0) {
      col.innerHTML = '<div class="loading">없음</div>';
      return;
    }
    col.innerHTML = members.map(m => {
      const data = JSON.stringify(m).replace(/"/g, '&quot;');
      const callsign = getCallsign(m.discord);
      return '<div class="member-row" data-nick="' + m.mcNick + '" data-discord="' + (m.discord||'') + '" data-callsign="' + callsign + '" data-join="' + formatDate(m.joinedAt) + '" onclick="showModal(' + data + ')">'
        + '<div class="skin-wrap"><img src="' + skinUrl(m.mcNick, 40) + '" alt="' + m.mcNick + '" onerror="this.style.opacity=0"></div>'
        + '<span class="member-name">' + m.mcNick + '</span>'
        + '<span class="online-dot"></span>'
        + '</div>';
    }).join('');
  }

  function applySearch(query) {
    const q = query.toLowerCase();
    document.querySelectorAll('.member-row').forEach(row => {
      const nick = row.dataset.nick.toLowerCase();
      row.classList.toggle('hidden', q.length > 0 && !nick.includes(q));
    });
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    applySearch(e.target.value);
  });

  document.addEventListener('mouseover', e => {
    const row = e.target.closest('.member-row');
    if (row) {
      document.getElementById('popup-nick').textContent = row.dataset.nick;
      document.getElementById('popup-callsign').textContent = row.dataset.callsign || '-';
      document.getElementById('popup-discord').textContent = row.dataset.discord || '-';
      document.getElementById('popup-join').textContent = '가입일 ' + row.dataset.join;
      popup.classList.add('active');
    }
  });

  document.addEventListener('mousemove', e => {
    if (popup.classList.contains('active')) {
      const x = e.clientX + 16;
      const y = e.clientY - 10;
      const pw = popup.offsetWidth;
      const ph = popup.offsetHeight;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      popup.style.left = (x + pw > vw ? e.clientX - pw - 16 : x) + 'px';
      popup.style.top = (y + ph > vh ? e.clientY - ph : y) + 'px';
    }
  });

  document.addEventListener('mouseout', e => {
    if (!e.target.closest('.member-row')) {
      popup.classList.remove('active');
    }
  });

  onSnapshot(collection(db, "members"), (snapshot) => {
    allMembers = [];
    snapshot.forEach(doc => allMembers.push({ id: doc.id, ...doc.data() }));
    renderCol('tier-head',   allMembers.filter(m => m.role === 'Head'));
    renderCol('tier-elder',  allMembers.filter(m => m.role === 'Elder'));
    renderCol('tier-senior', allMembers.filter(m => m.role === 'Senior'));
    renderCol('tier-fruit',  allMembers.filter(m => m.role === 'Fruit'));
    renderCol('tier-leaf',   allMembers.filter(m => m.role === 'Leaf'));
    renderCol('tier-seed',   allMembers.filter(m => m.role === 'Seed'));
    applySearch(document.getElementById('searchInput').value);
  });

  window.showModal = function(m) {
    const cfg = roleConfig[m.role] || { color: 'r-seed', label: m.role };
    document.getElementById('modal-skin').src = skinUrl(m.mcNick, 140);
    document.getElementById('modal-name').textContent = m.mcNick;
    document.getElementById('modal-rank').textContent = cfg.label;
    document.getElementById('modal-rank').className = 'modal-rank ' + cfg.color;
    document.getElementById('modal-discord').textContent = '🎮 ' + (m.discord || '');
    document.getElementById('modal-bio').textContent = m.bio || '자기소개가 없습니다.';
    document.getElementById('modal-region').textContent = m.region || '-';
    const modeEl = document.getElementById('modal-mode');
    if (m.mainMode && modeIcon[m.mainMode]) {
      modeEl.innerHTML = '<img src="' + modeIcon[m.mainMode] + '" style="width:22px;height:22px;image-rendering:pixelated;vertical-align:middle;margin-right:5px;">' + m.mainMode;
    } else {
      modeEl.textContent = m.mainMode || '-';
    }
    const roleEl = document.getElementById('modal-role');
    roleEl.innerHTML = '<span class="modal-rank ' + cfg.color + '" style="font-size:11px;padding:2px 8px;">' + cfg.label + '</span>';
    document.getElementById('modal').classList.add('active');
  }

  window.closeModal = function(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('active');
    }
  }
</script>

</body>
</html>
