<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaf Clan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #dde; font-family: 'Noto Sans KR', sans-serif; }
    nav { background: #181c27; border-bottom: 1px solid #2a2e3d; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Press Start 2P', monospace; font-size: 16px; color: #7ab800; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #7ab800; }
    .hero { text-align: center; padding: 48px 24px 32px; border-bottom: 1px solid #2a2e3d; }
    .hero h1 { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #7ab800; margin-bottom: 12px; }
    .hero p { color: #888; font-size: 14px; }
    .tier-section { padding: 24px; }
    .tier-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid #2a2e3d; border-radius: 8px; overflow: hidden; }
    .tier-col { border-right: 1px solid #2a2e3d; }
    .tier-col:last-child { border-right: none; }
    .tier-header { padding: 14px 16px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #2a2e3d; }
    .tier-subheader { padding: 6px 16px; font-size: 11px; font-weight: 600; border-bottom: 1px solid #2a2e3d; display: flex; align-items: center; gap: 6px; }
    .t-head-bg { background: #2a2200; } .t-head-color { color: #f5c518; }
    .t-elder-bg { background: #2a2700; } .t-elder-color { color: #e8d87a; }
    .t-senior-bg { background: #1a2200; } .t-senior-color { color: #4a7a30; }
    .t-fruit-bg { background: #1a2a10; } .t-fruit-color { color: #a0e040; }
    .t-leaf-bg { background: #0e2220; } .t-leaf-color { color: #40c8a0; }
    .t-seed-bg { background: #0e2220; } .t-seed-color { color: #40c8a0; }
    .member-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #1e2230; cursor: pointer; transition: background 0.15s; }
    .member-row:hover { background: #1e2235; }
    .member-row:last-child { border-bottom: none; }
    .skin-wrap { width: 36px; height: 36px; border-radius: 4px; overflow: hidden; background: #2a2e3d; flex-shrink: 0; }
    .skin-wrap img { width: 100%; height: 100%; image-rendering: pixelated; }
    .member-name { font-size: 15px; font-weight: 600; flex: 1; color: #eee; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { position: relative; background: #181c27; border: 1px solid #2a2e3d; border-radius: 16px; width: 520px; overflow: hidden; }
    .modal-head { padding: 28px 24px 24px; border-bottom: 1px solid #2a2e3d; display: flex; align-items: flex-end; gap: 20px; background: #12151f; }
    .modal-skin-wrap { width: 110px; height: 140px; flex-shrink: 0; overflow: hidden; filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.7)); }
    .modal-skin-wrap img { width: 100%; height: 100%; image-rendering: pixelated; object-fit: cover; }
    .modal-info { flex: 1; padding-bottom: 4px; }
    .modal-name { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #eee; }
    .modal-rank { font-size: 13px; padding: 4px 12px; border-radius: 6px; display: inline-block; margin-bottom: 8px; font-weight: 600; }
    .r-head   { background: #3a2e00; color: #f5c518; }
    .r-elder  { background: #2a2700; color: #e8d87a; }
    .r-senior { background: #1a2200; color: #4a7a30; }
    .r-fruit  { background: #1a2a10; color: #a0e040; }
    .r-leaf   { background: #0e2220; color: #40c8a0; }
    .r-seed   { background: #0e2220; color: #40c8a0; }
    .modal-discord { font-size: 13px; color: #5865f2; margin-top: 4px; }
    .modal-body { padding: 24px; }
    .modal-bio { font-size: 14px; color: #aaa; line-height: 1.8; margin-bottom: 20px; min-height: 40px; }
    .stats { display: flex; gap: 12px; }
    .stat { flex: 1; background: #0f1117; border: 1px solid #2a2e3d; border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: #666; margin-bottom: 6px; }
    .stat-val { font-size: 16px; font-weight: 700; color: #eee; }
    .close-btn { position: absolute; top: 14px; right: 18px; background: none; border: none; color: #666; font-size: 22px; cursor: pointer; }
    .close-btn:hover { color: #aaa; }
    .loading { text-align: center; padding: 40px; color: #666; font-size: 14px; }
  </style>
</head>
<body>

<nav>
  <div class="logo">LEAF</div>
  <div class="nav-links">
    <a href="#">홈</a>
    <a href="#">클랜원</a>
    <a href="#">공지</a>
  </div>
</nav>

<div class="hero">
  <h1>LEAF CLAN</h1>
  <p>마인크래프트 PvP 클랜</p>
</div>

<div class="tier-section">
  <div class="tier-grid">
    <div class="tier-col">
      <div class="tier-header t-head-bg t-head-color">👑 Head</div>
      <div id="tier-head" class="loading">불러오는 중...</div>
    </div>
    <div class="tier-col">
      <div class="tier-header t-elder-bg t-elder-color">🍃 Elder</div>
      <div id="tier-elder"></div>
      <div class="tier-subheader t-senior-bg t-senior-color">🍃 Senior</div>
      <div id="tier-senior"></div>
    </div>
    <div class="tier-col">
      <div class="tier-header t-fruit-bg t-fruit-color">🍃 Fruit</div>
      <div id="tier-fruit"></div>
      <div class="tier-subheader t-leaf-bg t-leaf-color">🍃 Leaf</div>
      <div id="tier-leaf"></div>
    </div>
    <div class="tier-col">
      <div class="tier-header t-seed-bg t-seed-color">💧 Seed</div>
      <div id="tier-seed" class="loading">불러오는 중...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">x</button>
    <div class="modal-head">
      <div class="modal-skin-wrap">
        <img id="modal-skin" src="" alt="">
      </div>
      <div class="modal-info">
        <div class="modal-name" id="modal-name"></div>
        <span class="modal-rank" id="modal-rank"></span>
        <div class="modal-discord" id="modal-discord"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-bio" id="modal-bio"></div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">지역</div>
          <div class="stat-val" id="modal-region">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">주 종목</div>
          <div class="stat-val" id="modal-mode">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">역할</div>
          <div class="stat-val" id="modal-role">-</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmoMAQQ21iq424Y9205wiBb2LIijpN2lY",
    authDomain: "leaf-clan.firebaseapp.com",
    projectId: "leaf-clan",
    storageBucket: "leaf-clan.firebasestorage.app",
    messagingSenderId: "63275953645",
    appId: "1:63275953645:web:810221cce6d66d9e9e8be4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const roleConfig = {
    Head:   { color: 'r-head',   label: '👑 Head' },
    Elder:  { color: 'r-elder',  label: '🍃 Elder' },
    Senior: { color: 'r-senior', label: '🍃 Senior' },
    Fruit:  { color: 'r-fruit',  label: '🍃 Fruit' },
    Leaf:   { color: 'r-leaf',   label: '🍃 Leaf' },
    Seed:   { color: 'r-seed',   label: '💧 Seed' },
  };

  const modeIcon = {
    SWORD: 'https://lemon3480-sudo.github.io/leaf-clan/images/sword.png',
    DPOT:  'https://lemon3480-sudo.github.io/leaf-clan/images/dpot.png',
    NPOT:  'https://lemon3480-sudo.github.io/leaf-clan/images/npot.png',
    UHC:   'https://lemon3480-sudo.github.io/leaf-clan/images/uhc.png',
    CPVP:  'https://lemon3480-sudo.github.io/leaf-clan/images/cpvp.png',
    SMP:   'https://lemon3480-sudo.github.io/leaf-clan/images/smp.png',
    AXE:   'https://lemon3480-sudo.github.io/leaf-clan/images/axe.png',
    MACE:  'https://lemon3480-sudo.github.io/leaf-clan/images/mace.png',
  };
  function skinUrl(nick, size) {
    return 'https://visage.surgeplay.com/bust/' + size + '/' + nick;
  }

  function renderCol(colId, members) {
    const col = document.getElementById(colId);
    if (!col) return;
    if (members.length === 0) {
      col.innerHTML = '<div class="loading">없음</div>';
      return;
    }
    col.innerHTML = members.map(m => {
      const data = JSON.stringify(m).replace(/"/g, '&quot;');
      return '<div class="member-row" onclick="showModal(' + data + ')">'
        + '<div class="skin-wrap"><img src="' + skinUrl(m.mcNick, 36) + '" alt="' + m.mcNick + '" onerror="this.style.opacity=0"></div>'
        + '<div><div class="member-name">' + m.mcNick + '</div></div>'
        + '</div>';
    }).join('');
  }

  onSnapshot(collection(db, "members"), (snapshot) => {
    const members = [];
    snapshot.forEach(doc => members.push({ id: doc.id, ...doc.data() }));
    renderCol('tier-head',   members.filter(m => m.role === 'Head'));
    renderCol('tier-elder',  members.filter(m => m.role === 'Elder'));
    renderCol('tier-senior', members.filter(m => m.role === 'Senior'));
    renderCol('tier-fruit',  members.filter(m => m.role === 'Fruit'));
    renderCol('tier-leaf',   members.filter(m => m.role === 'Leaf'));
    renderCol('tier-seed',   members.filter(m => m.role === 'Seed'));
  });

  window.showModal = function(m) {
    const cfg = roleConfig[m.role] || { color: 'r-seed', label: m.role };
    document.getElementById('modal-skin').src = skinUrl(m.mcNick, 140);
    document.getElementById('modal-name').textContent = m.mcNick;
    document.getElementById('modal-rank').textContent = cfg.label;
    document.getElementById('modal-rank').className = 'modal-rank ' + cfg.color;
    document.getElementById('modal-discord').textContent = '🎮 ' + (m.discord || '');
    document.getElementById('modal-bio').textContent = m.bio || '자기소개가 없습니다.';
 document.getElementById('modal-region').textContent = m.region || '-';
    const modeEl = document.getElementById('modal-mode');
    if (m.mainMode && modeIcon[m.mainMode]) {
      modeEl.innerHTML = '<img src="' + modeIcon[m.mainMode] + '" style="width:24px;height:24px;image-rendering:pixelated;vertical-align:middle;margin-right:6px;mix-blend-mode:screen;" onerror="this.style.display=\'none\'">' + m.mainMode;
    } else {
      modeEl.textContent = m.mainMode || '-';
    }
    const roleEl = document.getElementById('modal-role');
    roleEl.innerHTML = '<span class="modal-rank ' + cfg.color + '" style="font-size:11px;">' + cfg.label + '</span>';
    document.getElementById('modal').classList.add('active');
  }

  window.closeModal = function(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('active');
    }
  }
</script>

</body>
</html>
